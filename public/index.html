<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ren & Mav's Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f8f6;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.09);
      --border-hover: rgba(0,0,0,0.2);
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-muted: #9a9890;
      --radius-lg: 14px;
      --ren: #7a3f3f;
      --mav: #3b5c3b;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --surface: #232321;
        --border: rgba(255,255,255,0.08);
        --border-hover: rgba(255,255,255,0.2);
        --text-primary: #f1efea;
        --text-secondary: #b4b2a9;
        --text-muted: #6b6a66;
        --ren: #c49090;
        --mav: #85b085;
      }
      .accent-teal   { background: #04342C !important; color: #5DCAA5 !important; }
      .accent-blue   { background: #042C53 !important; color: #85B7EB !important; }
      .accent-amber  { background: #412402 !important; color: #EF9F27 !important; }
      .accent-coral  { background: #4A1B0C !important; color: #F0997B !important; }
      .accent-purple { background: #26215C !important; color: #AFA9EC !important; }
      .accent-green  { background: #173404 !important; color: #97C459 !important; }
      .accent-pink   { background: #4B1528 !important; color: #ED93B1 !important; }
      .pin-dot       { background: rgba(255,255,255,0.15) !important; }
      .pin-dot.filled { background: var(--text-primary) !important; }
      .pin-btn       { background: #2e2e2c !important; color: var(--text-primary) !important; }
      .pin-btn:hover { background: #3a3a38 !important; }
      .pin-btn.del   { background: transparent !important; }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── PIN SCREEN ── */
    #pin-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    #pin-screen h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.3rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .name-ren  { color: var(--ren); font-style: italic; }
    .name-mav  { color: var(--mav); }
    .ampersand { color: var(--text-muted); font-style: italic; margin: 0 0.08em; }

    #pin-screen p {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 2.5rem;
    }

    .pin-dots {
      display: flex;
      gap: 14px;
      margin-bottom: 2rem;
    }

    .pin-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: rgba(0,0,0,0.12);
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .pin-dot.filled {
      background: var(--text-primary);
      transform: scale(1.15);
    }

    .pin-dot.error { background: #c0392b !important; }

    .pin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 220px;
    }

    .pin-btn {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      font-family: 'DM Sans', sans-serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--text-primary);
      width: 100%;
      aspect-ratio: 1;
      cursor: pointer;
      transition: background 0.1s ease, transform 0.08s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .pin-btn:hover  { border-color: var(--border-hover); }
    .pin-btn:active { transform: scale(0.93); }
    .pin-btn.zero   { grid-column: 2; }

    .pin-btn.del {
      background: transparent;
      border-color: transparent;
      font-size: 15px;
      color: var(--text-muted);
    }

    .pin-btn.del:hover { color: var(--text-primary); }

    #pin-error {
      margin-top: 1.2rem;
      font-size: 12px;
      color: #c0392b;
      letter-spacing: 0.03em;
      opacity: 0;
      transition: opacity 0.2s;
      height: 16px;
    }

    #pin-error.show { opacity: 1; }

    /* ── DASHBOARD ── */
    #dashboard {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 1.25rem 2.5rem;
    }

    #dashboard.visible { display: flex; }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    header p {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 8px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .section {
      width: 100%;
      max-width: 420px;
    }

    /* ── ICON GRID ── */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .app-tile {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 0;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      transition: border-color 0.14s ease, transform 0.14s ease, box-shadow 0.14s ease;
      -webkit-tap-highlight-color: transparent;
    }

    a.app-tile:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(0,0,0,0.07);
    }

    a.app-tile:active { transform: scale(0.96); }

    .app-tile.coming-soon {
      opacity: 0.4;
      pointer-events: none;
      user-select: none;
    }

    /* ── ALL TILES — unified graphical style ── */

    /* Every tile is a full-bleed scene */
    .app-tile {
      padding: 0 !important;
      justify-content: flex-end !important;
    }

    /* The SVG art fills the tile */
    .tile-art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Label bar — inline row, frosted backing */
    .tile-label {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 7px 8px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.38) 0%, rgba(0,0,0,0) 100%);
    }

    /* light-bg tiles need a lighter scrim */
    .tile-label.light {
      background: linear-gradient(to top, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 100%);
    }

    .tile-name {
      font-size: 11px;
      font-weight: 500;
      text-align: center;
      line-height: 1.2;
      color: #ffffff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .tile-label.light .tile-name {
      color: #1a1a18;
      text-shadow: 0 1px 2px rgba(255,255,255,0.6);
    }

    .tile-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-live { background: #4ecca3; }
    .dot-soon { background: rgba(255,255,255,0.35); }

    .tile-label.light .dot-live { background: #0F6E56; }
    .tile-label.light .dot-soon { background: rgba(0,0,0,0.2); }

    @media (prefers-color-scheme: dark) {
      .dot-live { background: #5DCAA5; }
    }

    /* divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.4rem 0 1rem;
    }

    .divider span {
      font-size: 10.5px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      font-weight: 300;
    }

    .divider hr { flex: 1; border: none; border-top: 0.5px solid var(--border); }

    /* request row */
    .request-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.14s ease, transform 0.14s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .request-row:hover {
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    .request-row:active { transform: scale(0.98); }

    .req-icon {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .req-name {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .req-desc {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 300;
    }

    .req-arrow {
      margin-left: auto;
      font-size: 16px;
      color: var(--text-muted);
    }

    footer {
      margin-top: 2.5rem;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.03em;
      font-style: italic;
    }

    .icon {
      display: inline-block;
      width: 22px;
      height: 22px;
      vertical-align: middle;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-sm {
      display: inline-block;
      width: 18px;
      height: 18px;
      vertical-align: middle;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>

  <!-- PIN SCREEN -->
  <div id="pin-screen">
    <h1><span class="name-ren">Ren</span><span class="ampersand"> &amp; </span><span class="name-mav">Mav</span>'s Home</h1>
    <p>enter your pin</p>

    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <div class="pin-grid">
      <button class="pin-btn" onclick="press('1')">1</button>
      <button class="pin-btn" onclick="press('2')">2</button>
      <button class="pin-btn" onclick="press('3')">3</button>
      <button class="pin-btn" onclick="press('4')">4</button>
      <button class="pin-btn" onclick="press('5')">5</button>
      <button class="pin-btn" onclick="press('6')">6</button>
      <button class="pin-btn" onclick="press('7')">7</button>
      <button class="pin-btn" onclick="press('8')">8</button>
      <button class="pin-btn" onclick="press('9')">9</button>
      <button class="pin-btn zero" onclick="press('0')">0</button>
      <button class="pin-btn del" onclick="del()" aria-label="Delete">⌫</button>
    </div>

    <div id="pin-error">incorrect pin</div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <header>
      <h1><span class="name-ren">Ren</span><span class="ampersand"> &amp; </span><span class="name-mav">Mav</span>'s Home</h1>
      <p>your household tools</p>
    </header>

    <main class="section">

      <div class="app-grid">

        <!-- Ren's Journal — night sky + cat -->
        <a class="app-tile" style="background:#130d28;border-color:#3a2860;" href="https://ren.reilly.live" target="_blank" rel="noopener noreferrer">
          <svg class="tile-art" viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid slice">
            <defs>
              <linearGradient id="renSky" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#130d28"/>
                <stop offset="100%" stop-color="#251545"/>
              </linearGradient>
              <radialGradient id="renMoonGlow" cx="72%" cy="26%" r="32%">
                <stop offset="0%" stop-color="#f5e8a0" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="#f5e8a0" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect width="120" height="110" fill="url(#renSky)"/>
            <rect width="120" height="110" fill="url(#renMoonGlow)"/>
            <circle cx="14" cy="11" r="1.3" fill="#e8daf5" opacity="0.85"/>
            <circle cx="38" cy="6"  r="1.0" fill="#e8daf5" opacity="0.7"/>
            <circle cx="58" cy="15" r="1.5" fill="#e8daf5" opacity="0.9"/>
            <circle cx="28" cy="26" r="0.9" fill="#e8daf5" opacity="0.6"/>
            <circle cx="48" cy="30" r="0.7" fill="#e8daf5" opacity="0.5"/>
            <circle cx="88" cy="24" r="18" fill="#f5e8a0" opacity="0.92"/>
            <circle cx="96" cy="18" r="14" fill="#130d28"/>
            <g transform="translate(40,108)">
              <ellipse cx="0" cy="-18" rx="18" ry="20" fill="#111218"/>
              <ellipse cx="0" cy="-40" rx="15" ry="13" fill="#111218"/>
              <polygon points="-15,-48 -10,-64 -4,-48" fill="#111218"/>
              <polygon points="15,-48 10,-64 4,-48" fill="#111218"/>
              <ellipse cx="-5.5" cy="-41" rx="4.5" ry="4" fill="#7acc44"/>
              <ellipse cx="5.5"  cy="-41" rx="4.5" ry="4" fill="#7acc44"/>
              <ellipse cx="-5.5" cy="-41" rx="1.6" ry="3.5" fill="#0a0810"/>
              <ellipse cx="5.5"  cy="-41" rx="1.6" ry="3.5" fill="#0a0810"/>
            </g>
          </svg>
          <div class="tile-label">
            <div class="tile-name">Ren's Journal</div>
            <div class="tile-dot dot-live"></div>
          </div>
        </a>

        <!-- Mav's Quest Log — parchment + shield -->
        <a class="app-tile" style="background:#e8d9b0;border-color:#c2a878;" href="https://mav.reilly.live" target="_blank" rel="noopener noreferrer">
          <svg class="tile-art" viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid slice">
            <defs>
              <linearGradient id="mavParch" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#f0e4c6"/>
                <stop offset="100%" stop-color="#dcc898"/>
              </linearGradient>
              <radialGradient id="mavGold" cx="50%" cy="40%" r="42%">
                <stop offset="0%" stop-color="#d4a820" stop-opacity="0.22"/>
                <stop offset="100%" stop-color="#d4a820" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect width="120" height="110" fill="url(#mavParch)"/>
            <rect width="120" height="110" fill="url(#mavGold)"/>
            <path d="M60,12 L84,24 L84,54 C84,70 60,82 60,82 C60,82 36,70 36,54 L36,24 Z" fill="#b8860b" opacity="0.18"/>
            <path d="M60,12 L84,24 L84,54 C84,70 60,82 60,82 C60,82 36,70 36,54 L36,24 Z" fill="none" stroke="#8a6508" stroke-width="2.5" opacity="0.6"/>
            <line x1="60" y1="4"  x2="60" y2="88" stroke="#8a6508" stroke-width="3.5" stroke-linecap="round" opacity="0.65"/>
            <line x1="44" y1="30" x2="76" y2="30" stroke="#8a6508" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
            <circle cx="60" cy="88" r="5" fill="#8a6508" opacity="0.55"/>
          </svg>
          <div class="tile-label light">
            <div class="tile-name">Quest Log</div>
            <div class="tile-dot dot-live"></div>
          </div>
        </a>

        <!-- Meal Hub — warm kitchen scene -->
        <a class="app-tile" style="background:#1a3828;border-color:#2a5438;" href="https://shopping.reilly.live" target="_blank" rel="noopener noreferrer">
          <svg class="tile-art" viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid slice">
            <defs>
              <linearGradient id="mealBg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#0f2418"/>
                <stop offset="100%" stop-color="#1e3d28"/>
              </linearGradient>
              <radialGradient id="mealGlow" cx="50%" cy="45%" r="40%">
                <stop offset="0%" stop-color="#5daa78" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="#5daa78" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect width="120" height="110" fill="url(#mealBg)"/>
            <rect width="120" height="110" fill="url(#mealGlow)"/>
            <!-- pot -->
            <ellipse cx="60" cy="58" rx="30" ry="8" fill="#3a8c58" opacity="0.4"/>
            <rect x="32" y="42" width="56" height="28" rx="6" fill="#2e7048" opacity="0.7"/>
            <ellipse cx="60" cy="42" rx="28" ry="7" fill="#3a8c58" opacity="0.8"/>
            <ellipse cx="60" cy="42" rx="22" ry="5" fill="#1e5038" opacity="0.6"/>
            <!-- steam lines -->
            <path d="M48,38 Q46,30 48,22" fill="none" stroke="#a8e8c0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
            <path d="M60,36 Q58,26 60,16" fill="none" stroke="#a8e8c0" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
            <path d="M72,38 Q70,28 72,20" fill="none" stroke="#a8e8c0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
            <!-- handles -->
            <rect x="18" y="46" width="14" height="8" rx="4" fill="#2e7048" opacity="0.7"/>
            <rect x="88" y="46" width="14" height="8" rx="4" fill="#2e7048" opacity="0.7"/>
            <!-- veggies on top -->
            <circle cx="50" cy="42" r="4" fill="#e85454" opacity="0.8"/>
            <circle cx="62" cy="40" r="3.5" fill="#f0a030" opacity="0.8"/>
            <circle cx="73" cy="43" r="3" fill="#70c840" opacity="0.8"/>
          </svg>
          <div class="tile-label">
            <div class="tile-name">Meal Hub</div>
            <div class="tile-dot dot-live"></div>
          </div>
        </a>

        <!-- Ledger — dark navy coins scene -->
        <a class="app-tile" style="background:#1a1608;border-color:#3a3010;" href="https://budget.reilly.live" target="_blank" rel="noopener noreferrer">
          <svg class="tile-art" viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid slice">
            <defs>
              <linearGradient id="ledgBg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#12100a"/>
                <stop offset="100%" stop-color="#1e1a0c"/>
              </linearGradient>
              <radialGradient id="ledgGlow" cx="50%" cy="50%" r="45%">
                <stop offset="0%" stop-color="#c8960c" stop-opacity="0.22"/>
                <stop offset="100%" stop-color="#c8960c" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect width="120" height="110" fill="url(#ledgBg)"/>
            <rect width="120" height="110" fill="url(#ledgGlow)"/>
            <!-- coin stack left -->
            <ellipse cx="38" cy="70" rx="14" ry="4.5" fill="#c8960c" opacity="0.8"/>
            <rect x="24" y="55" width="28" height="15" fill="#c8960c" opacity="0.7"/>
            <ellipse cx="38" cy="55" rx="14" ry="4.5" fill="#e0b030" opacity="0.85"/>
            <ellipse cx="38" cy="50" rx="14" ry="4.5" fill="#c8960c" opacity="0.8"/>
            <rect x="24" y="38" width="28" height="12" fill="#c8960c" opacity="0.65"/>
            <ellipse cx="38" cy="38" rx="14" ry="4.5" fill="#e0b030" opacity="0.85"/>
            <!-- coin stack right -->
            <ellipse cx="82" cy="74" rx="14" ry="4.5" fill="#c8960c" opacity="0.8"/>
            <rect x="68" y="62" width="28" height="12" fill="#c8960c" opacity="0.7"/>
            <ellipse cx="82" cy="62" rx="14" ry="4.5" fill="#e0b030" opacity="0.85"/>
            <!-- dollar sign -->
            <text x="60" y="48" text-anchor="middle" fill="#e0b030" font-size="28" font-family="Georgia,serif" opacity="0.25" font-weight="bold">$</text>
            <!-- sparkle top -->
            <g transform="translate(60,18)" opacity="0.5">
              <line x1="0" y1="-7" x2="0" y2="7" stroke="#e0b030" stroke-width="1.5"/>
              <line x1="-7" y1="0" x2="7" y2="0" stroke="#e0b030" stroke-width="1.5"/>
            </g>
          </svg>
          <div class="tile-label">
            <div class="tile-name">Ledger</div>
            <div class="tile-dot dot-live"></div>
          </div>
        </a>

        <!-- Pets — warm terracotta, paw + collar -->
        <a class="app-tile" style="background:#2a1208;border-color:#4a2818;" href="https://pets.reilly.live" target="_blank" rel="noopener noreferrer">
          <svg class="tile-art" viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid slice">
            <defs>

  <script>
    const SESSION_KEY = 'renmav_auth';
    let entered = '';
    let checking = false;

    if (sessionStorage.getItem(SESSION_KEY) === 'true') unlock(false);

    function press(digit) {
      if (entered.length >= 4 || checking) return;
      entered += digit;
      updateDots();
      if (entered.length === 4) {
        checking = true;
        setTimeout(check, 120);
      }
    }

    function del() {
      if (checking) return;
      entered = entered.slice(0, -1);
      updateDots();
      clearError();
    }

    function updateDots() {
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById('d' + i);
        dot.classList.toggle('filled', i < entered.length);
        dot.classList.remove('error');
      }
    }

    async function check() {
      try {
        const res = await fetch('/api/verify-pin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin: entered }),
        });
        const { ok } = await res.json();
        if (ok) {
          sessionStorage.setItem(SESSION_KEY, 'true');
          unlock(true);
        } else {
          showError();
        }
      } catch (e) {
        showError();
      } finally {
        if (!sessionStorage.getItem(SESSION_KEY)) {
          for (let i = 0; i < 4; i++) {
            const dot = document.getElementById('d' + i);
            dot.classList.add('error');
            dot.classList.remove('filled');
          }
          setTimeout(() => {
            entered = '';
            checking = false;
            updateDots();
          }, 600);
        }
      }
    }

    function unlock(animate) {
      const pin = document.getElementById('pin-screen');
      const dash = document.getElementById('dashboard');
      if (animate) {
        pin.style.transition = 'opacity 0.3s ease';
        pin.style.opacity = '0';
        setTimeout(() => {
          pin.style.display = 'none';
          dash.classList.add('visible');
        }, 300);
      } else {
        pin.style.display = 'none';
        dash.classList.add('visible');
      }
    }

    function showError() {
      document.getElementById('pin-error').classList.add('show');
    }

    function clearError() {
      document.getElementById('pin-error').classList.remove('show');
    }

    document.addEventListener('keydown', (e) => {
      if (document.getElementById('pin-screen').style.display === 'none') return;
      if (e.key >= '0' && e.key <= '9') press(e.key);
      if (e.key === 'Backspace') del();
    });
  </script>
