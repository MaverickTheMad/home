<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grove</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <!-- Flash-free theme: apply the cached choice synchronously, before paint. -->
  <script>
    try {
      var t = localStorage.getItem('grove_theme') || 'auto';
      if (t === 'dark')  document.documentElement.classList.add('theme-dark');
      if (t === 'light') document.documentElement.classList.add('theme-light');
    } catch (e) {}
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── GROVE TOKENS ── */
    :root {
      --bg:          #10140E;
      --bg-paper:    #171C13;
      --bg-elevated: #1E241A;
      --border:      #2A3122;
      --text:        #ECEFE6;
      --text-soft:   #9BA690;

      --accent:    #4FA06F;
      --secondary: #9B82BE;

      --font-display: 'Fraunces', serif;
      --font-body:    'Plus Jakarta Sans', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;

      --fs-xs:  0.64rem;
      --fs-sm:  0.8rem;
      --fs-base:1rem;
      --fs-lg:  1.25rem;
      --fs-2xl: 1.953rem;

      --fw-title: 600;
      --fw-med:   500;
      --fw-body:  400;

      --r-sm:  6px;
      --r-md:  12px;
      --r-lg:  16px;
      --r-full:999px;

      --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px;
      --sp-5:24px; --sp-6:32px; --sp-8:48px;
    }

    @media (prefers-color-scheme: light) { :root:not(.theme-dark) {
      --bg:#F3F5EE; --bg-paper:#FAFBF5; --bg-elevated:#FFFFFF;
      --border:#D8DECF; --text:#1A1F15; --text-soft:#5C6651;
      --accent:#2F6B47; --secondary:#6E5891;
    }}

    /* manual overrides (Settings → Appearance) */
    :root.theme-light {
      --bg:#F3F5EE; --bg-paper:#FAFBF5; --bg-elevated:#FFFFFF;
      --border:#D8DECF; --text:#1A1F15; --text-soft:#5C6651;
      --accent:#2F6B47; --secondary:#6E5891;
    }
    :root.theme-dark {
      --bg:#10140E; --bg-paper:#171C13; --bg-elevated:#1E241A;
      --border:#2A3122; --text:#ECEFE6; --text-soft:#9BA690;
      --accent:#4FA06F; --secondary:#9B82BE;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: 0ms !important; }
    }

    /* ── BASE ── */
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--sp-8) var(--sp-5) var(--sp-6);
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-2);
      margin-bottom: var(--sp-6);
    }

    .wordmark {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }

    .grove-mark {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .grove-name {
      font-family: var(--font-display);
      font-size: var(--fs-2xl);
      font-weight: var(--fw-title);
      color: var(--text);
      letter-spacing: -0.025em;
      line-height: 1;
    }

    .tagline {
      font-family: var(--font-body);
      font-size: var(--fs-xs);
      color: var(--text-soft);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: var(--fw-body);
    }

    /* ── SETTINGS GEAR ── */
    .settings-gear {
      position: fixed;
      top: var(--sp-4);
      right: var(--sp-4);
      width: 40px;
      height: 40px;
      border-radius: var(--r-full);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-paper);
      border: 0.5px solid var(--border);
      color: var(--text-soft);
      text-decoration: none;
      transition: border-color 160ms cubic-bezier(.2,.8,.2,1),
                  color 160ms cubic-bezier(.2,.8,.2,1),
                  transform 160ms cubic-bezier(.2,.8,.2,1);
      -webkit-tap-highlight-color: transparent;
      z-index: 30;
    }
    .settings-gear:hover  { border-color: var(--accent); color: var(--accent); transform: rotate(35deg); }
    .settings-gear:active { transform: scale(0.92); }
    .settings-gear svg {
      width: 19px; height: 19px;
      fill: none; stroke: currentColor; stroke-width: 1.7;
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── TODAY GLANCE ── */
    .today {
      width: 100%;
      max-width: 380px;
      margin-bottom: var(--sp-5);
    }
    .today-label {
      font-size: var(--fs-xs);
      color: var(--text-soft);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: var(--fw-body);
      margin-bottom: var(--sp-3);
      padding-left: var(--sp-1);
    }
    .glance {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: var(--sp-2);
    }
    .glance-card {
      position: relative;
      overflow: hidden;
      background: var(--bg-paper);
      border: 0.5px solid var(--border);
      border-radius: var(--r-md);
      padding: var(--sp-3) var(--sp-4);
      display: flex;
      flex-direction: column;
      gap: 2px;
      text-decoration: none;
      color: inherit;
      transition: border-color 160ms cubic-bezier(.2,.8,.2,1),
                  transform    160ms cubic-bezier(.2,.8,.2,1);
      -webkit-tap-highlight-color: transparent;
    }
    .glance-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 100% 0%, color-mix(in srgb, var(--gc, var(--accent)) 16%, transparent) 0%, transparent 70%);
      pointer-events: none;
    }
    .glance-card:hover  { border-color: color-mix(in srgb, var(--gc, var(--accent)) 55%, transparent); transform: translateY(-2px); }
    .glance-card:active { transform: scale(0.97); }
    .gc-label {
      position: relative; z-index: 1;
      font-size: var(--fs-xs);
      color: var(--text-soft);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: var(--fw-med);
    }
    .gc-value {
      position: relative; z-index: 1;
      font-family: var(--font-mono);
      font-size: var(--fs-lg);
      font-weight: var(--fw-med);
      color: var(--text);
      line-height: 1.1;
      margin-top: 2px;
    }
    /* text-y values (recipe name, event title) read better in the body face */
    .gc-value.is-text {
      font-family: var(--font-body);
      font-size: var(--fs-base);
      line-height: 1.25;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .gc-sub {
      position: relative; z-index: 1;
      font-size: var(--fs-xs);
      color: var(--text-soft);
      font-weight: var(--fw-body);
      line-height: 1.3;
    }

    /* ── GRID ── */
    .section {
      width: 100%;
      max-width: 380px;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-2);
    }

    /* ── TILE ── */
    .app-tile {
      background: var(--bg-paper);
      border: 0.5px solid var(--border);
      border-radius: var(--r-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      /* min 44px tap target guaranteed by aspect-ratio on grid */
      transition: border-color 160ms cubic-bezier(.2,.8,.2,1),
                  transform    160ms cubic-bezier(.2,.8,.2,1);
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    a.app-tile:hover  { border-color: color-mix(in srgb, var(--tile-color) 60%, transparent); transform: translateY(-2px); }
    a.app-tile:active { transform: scale(0.95); }

    /* colored radial glow from center */
    .app-tile::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 46%, color-mix(in srgb, var(--tile-color) 22%, transparent) 0%, transparent 72%);
      pointer-events: none;
    }

    /* icon — centered, sits above the label */
    .tile-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 22px; /* shift up slightly to account for label */
    }

    .tile-icon svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: var(--tile-color);
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.82;
    }

    /* label bar */
    .tile-label {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-1);
      padding: var(--sp-2) var(--sp-2) var(--sp-3);
      background: linear-gradient(to top,
        color-mix(in srgb, var(--bg) 80%, transparent) 0%,
        transparent 100%);
    }

    .tile-name {
      font-size: var(--fs-xs);
      font-weight: var(--fw-med);
      color: var(--text);
      text-align: center;
      line-height: 1.2;
      letter-spacing: 0.01em;
    }

    .tile-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--accent);
      opacity: 0.85;
    }

    /* ── FEEDBACK ── */
    /* generous whitespace instead of a divider */
    .feedback-section {
      margin-top: var(--sp-6);
    }

    .feedback-label {
      font-size: var(--fs-xs);
      color: var(--text-soft);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: var(--fw-body);
      margin-bottom: var(--sp-3);
      padding-left: var(--sp-1);
    }

    .request-row {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      background: var(--bg-paper);
      border: 0.5px solid var(--border);
      border-radius: var(--r-lg);
      padding: var(--sp-3) var(--sp-4);
      text-decoration: none;
      color: inherit;
      transition: border-color 160ms cubic-bezier(.2,.8,.2,1),
                  transform    160ms cubic-bezier(.2,.8,.2,1);
      -webkit-tap-highlight-color: transparent;
    }

    .request-row:hover  { border-color: var(--accent); transform: translateY(-1px); }
    .request-row:active { transform: scale(0.98); }

    .req-icon {
      width: 38px;
      height: 38px;
      border-radius: var(--r-md);
      background: color-mix(in srgb, var(--accent) 14%, var(--bg-paper));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .req-icon svg {
      width: 17px;
      height: 17px;
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .req-copy { flex: 1; }

    .req-name {
      font-size: var(--fs-sm);
      font-weight: var(--fw-med);
      color: var(--text);
      line-height: 1.3;
    }

    .req-desc {
      font-size: var(--fs-xs);
      color: var(--text-soft);
      font-weight: var(--fw-body);
      margin-top: 1px;
    }

    .req-arrow {
      font-size: 18px;
      color: var(--text-soft);
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    footer {
      margin-top: var(--sp-6);
      font-family: var(--font-display);
      font-style: italic;
      font-size: var(--fs-xs);
      color: var(--text-soft);
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <!-- SETTINGS -->
  <a class="settings-gear" href="/settings.html" aria-label="Settings">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </a>

  <!-- HEADER -->
  <div class="header">
    <div class="wordmark">
      <svg class="grove-mark" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M14 25 C14 25 4 19 4 11 C4 6 8.5 3 14 3 C19.5 3 24 6 24 11 C24 19 14 25 14 25Z"
          stroke="#4FA06F" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
        <line x1="14" y1="25" x2="14" y2="12" stroke="#4FA06F" stroke-width="1.3" stroke-linecap="round"/>
        <path d="M14 18 C14 18 10.5 15.5 9 13" stroke="#9B82BE" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M14 15 C14 15 17 13 19 11" stroke="#9B82BE" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <span class="grove-name">Grove</span>
    </div>
    <p class="tagline">Ren &amp; Mav's home</p>
  </div>

  <main class="section">

    <!-- TODAY AT A GLANCE — populated by today.js from each app's schema.
         Stays hidden until at least one card has data. -->
    <section class="today" id="today" hidden>
      <p class="today-label">Today</p>
      <div class="glance" id="glance"></div>
    </section>

    <!-- Tiles render here from APP_META, then the registry (core.apps)
         overlays hide / reorder / rename. See the module script below. -->
    <div class="app-grid" id="appGrid"></div>
    <noscript><p style="color:var(--text-soft);text-align:center;font-size:var(--fs-sm)">Enable JavaScript to open Grove.</p></noscript>

    <!-- Request a tool -->
    <div class="feedback-section">
      <p class="feedback-label">Feedback</p>
      <a class="request-row" href="https://form.typeform.com/to/Ee2dx8VJ" target="_blank" rel="noopener noreferrer">
        <div class="req-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </div>
        <div class="req-copy">
          <div class="req-name">Request a tool</div>
          <div class="req-desc">Got an idea? I'll build it</div>
        </div>
        <span class="req-arrow">›</span>
      </a>
    </div>

  </main>

  <footer>made with ♥ by your husband</footer>

  <script type="module">
    import { whoami, loadTheme, getApps } from '/grove-core.js';

    // Bespoke per-tile icon + dark backdrop, keyed by the registry slug.
    // The registry (core.apps) controls show/hide, order, name, subdomain,
    // and accent; the artwork stays here in code.
    const APP_META = {
      journal:  { name:"Ren's Journal", url:'https://ren.reilly.live',      accent:'#D06A82', bg:'#130a14', svg:`<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>` },
      quest:    { name:'Quest Log',     url:'https://mav.reilly.live',      accent:'#A877B8', bg:'#0e0a14', svg:`<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>` },
      pantry:   { name:'Meal Hub',      url:'https://shopping.reilly.live', accent:'#CB7A4F', bg:'#120c08', svg:`<path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>` },
      ledger:   { name:'Ledger',        url:'https://budget.reilly.live',   accent:'#6F86C2', bg:'#08090e', svg:`<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>` },
      pets:     { name:'Pets',          url:'https://pets.reilly.live',     accent:'#D8A24F', bg:'#120e06', svg:`<circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="20" cy="16" r="2"/><path d="M9 10a5 5 0 0 1 5 5v3.5a3.5 3.5 0 0 1-6.84 1.045Q6.52 17.48 4.46 16.84A3.5 3.5 0 0 1 5.5 10Z"/>` },
      media:    { name:'Media',         url:'https://media.reilly.live',    accent:'#4CA39B', bg:'#060e0e', svg:`<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>` },
      calendar: { name:'Calendar',      url:'https://almanac.reilly.live',  accent:'#79B45F', bg:'#080e06', svg:`<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="8" y2="14" stroke-width="2.5"/><line x1="12" y1="14" x2="12" y2="14" stroke-width="2.5"/><line x1="16" y1="14" x2="16" y2="14" stroke-width="2.5"/><line x1="8" y1="18" x2="8" y2="18" stroke-width="2.5"/><line x1="12" y1="18" x2="12" y2="18" stroke-width="2.5"/>` },
      workout:  { name:'Workout',       url:'https://fitness.reilly.live',  accent:'#4FA06F', bg:'#070e08', svg:`<line x1="6.5" y1="12" x2="17.5" y2="12" stroke-width="2.5"/><line x1="4" y1="8.5" x2="4" y2="15.5" stroke-width="3.5"/><line x1="2" y1="10" x2="2" y2="14" stroke-width="3.5"/><line x1="20" y1="8.5" x2="20" y2="15.5" stroke-width="3.5"/><line x1="22" y1="10" x2="22" y2="14" stroke-width="3.5"/>` },
    };
    const ORDER = ['journal','quest','pantry','ledger','pets','media','calendar','workout'];
    const grid = document.getElementById('appGrid');

    function tile(m) {
      const a = document.createElement('a');
      a.className = 'app-tile';
      a.href = m.url || '#';
      a.target = '_blank'; a.rel = 'noopener noreferrer';
      a.style.setProperty('--tile-color', m.accent || 'var(--accent)');
      if (m.bg) a.style.background = m.bg;
      a.innerHTML = `<div class="tile-icon" aria-hidden="true"><svg viewBox="0 0 24 24">${m.svg || '<circle cx="12" cy="12" r="4"/>'}</svg></div>`;
      const label = document.createElement('div'); label.className = 'tile-label';
      const name = document.createElement('span'); name.className = 'tile-name'; name.textContent = m.name || m.slug;
      const dot = document.createElement('span'); dot.className = 'tile-dot';
      label.append(name, dot); a.append(label);
      return a;
    }
    const render = (list) => grid.replaceChildren(...list.map(tile));

    // 1) Instant paint from local defaults — works even if Supabase is down.
    render(ORDER.map((slug) => ({ slug, ...APP_META[slug] })));

    // 2) Reconcile theme + overlay the registry once it loads.
    (async () => {
      try {
        const who = await whoami();
        loadTheme(who.person?.id);
        // Optional enhancement — load lazily so a missing/broken today.js can
        // NEVER take down the launcher grid. Failure here is swallowed.
        import('/today.js').then(m => m.renderToday()).catch(() => {});
        const apps = await getApps({ onlyEnabled: true });
        if (apps.length) {
          render(apps.map((a) => {
            const meta = APP_META[a.slug] || {};
            return {
              slug: a.slug,
              name: a.name || meta.name,
              url: a.subdomain ? `https://${a.subdomain}` : meta.url,
              accent: a.accent_hex || meta.accent,
              bg: meta.bg,
              svg: meta.svg,
            };
          }));
        }
      } catch (e) { /* keep the local default grid */ }
    })();
  </script>

</body>
</html>
