<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ren & Mav's Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f8f6;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.09);
      --border-hover: rgba(0,0,0,0.2);
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-muted: #9a9890;
      --radius-lg: 14px;
      --ren: #7a3f3f;
      --mav: #3b5c3b;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --surface: #232321;
        --border: rgba(255,255,255,0.08);
        --border-hover: rgba(255,255,255,0.2);
        --text-primary: #f1efea;
        --text-secondary: #b4b2a9;
        --text-muted: #6b6a66;
        --ren: #c49090;
        --mav: #85b085;
      }
      .accent-teal   { background: #04342C !important; color: #5DCAA5 !important; }
      .accent-blue   { background: #042C53 !important; color: #85B7EB !important; }
      .accent-amber  { background: #412402 !important; color: #EF9F27 !important; }
      .accent-coral  { background: #4A1B0C !important; color: #F0997B !important; }
      .accent-purple { background: #26215C !important; color: #AFA9EC !important; }
      .accent-green  { background: #173404 !important; color: #97C459 !important; }
      .accent-pink   { background: #4B1528 !important; color: #ED93B1 !important; }
      .pin-dot       { background: rgba(255,255,255,0.15) !important; }
      .pin-dot.filled { background: var(--text-primary) !important; }
      .pin-btn       { background: #2e2e2c !important; color: var(--text-primary) !important; }
      .pin-btn:hover { background: #3a3a38 !important; }
      .pin-btn.del   { background: transparent !important; }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── PIN SCREEN ── */
    #pin-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    #pin-screen h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.3rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .name-ren  { color: var(--ren); font-style: italic; }
    .name-mav  { color: var(--mav); }
    .ampersand { color: var(--text-muted); font-style: italic; margin: 0 0.08em; }

    #pin-screen p {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 2.5rem;
    }

    .pin-dots {
      display: flex;
      gap: 14px;
      margin-bottom: 2rem;
    }

    .pin-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: rgba(0,0,0,0.12);
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .pin-dot.filled {
      background: var(--text-primary);
      transform: scale(1.15);
    }

    .pin-dot.error { background: #c0392b !important; }

    .pin-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 220px;
    }

    .pin-btn {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      font-family: 'DM Sans', sans-serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--text-primary);
      width: 100%;
      aspect-ratio: 1;
      cursor: pointer;
      transition: background 0.1s ease, transform 0.08s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .pin-btn:hover  { border-color: var(--border-hover); }
    .pin-btn:active { transform: scale(0.93); }
    .pin-btn.zero   { grid-column: 2; }

    .pin-btn.del {
      background: transparent;
      border-color: transparent;
      font-size: 15px;
      color: var(--text-muted);
    }

    .pin-btn.del:hover { color: var(--text-primary); }

    #pin-error {
      margin-top: 1.2rem;
      font-size: 12px;
      color: #c0392b;
      letter-spacing: 0.03em;
      opacity: 0;
      transition: opacity 0.2s;
      height: 16px;
    }

    #pin-error.show { opacity: 1; }

    /* ── DASHBOARD ── */
    #dashboard {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 1.25rem 2.5rem;
    }

    #dashboard.visible { display: flex; }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    header p {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 8px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .section {
      width: 100%;
      max-width: 420px;
    }

    /* ── ICON GRID ── */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .app-tile {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 8px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
      transition: border-color 0.14s ease, transform 0.14s ease, box-shadow 0.14s ease;
      -webkit-tap-highlight-color: transparent;
    }

    a.app-tile:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(0,0,0,0.07);
    }

    a.app-tile:active { transform: scale(0.96); }

    .app-tile.coming-soon {
      opacity: 0.4;
      pointer-events: none;
      user-select: none;
    }

    .tile-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    /* standard accent colors */
    .accent-teal   { background: #E1F5EE; color: #0F6E56; }
    .accent-blue   { background: #E6F1FB; color: #185FA5; }
    .accent-amber  { background: #FAEEDA; color: #854F0B; }
    .accent-coral  { background: #FAECE7; color: #993C1D; }
    .accent-purple { background: #EEEDFE; color: #534AB7; }
    .accent-green  { background: #EAF3DE; color: #3B6D11; }
    .accent-pink   { background: #FBEAF0; color: #993356; }

    /* ── CHARACTER TILES — Ren's Journal & Mav's Quest Log ── */

    /* Ren — mystical night sky, matches Grimoire */
    .tile-ren {
      background: #1a1230;
      border-color: #3a2860;
      padding: 0;
      justify-content: flex-end;
    }

    .tile-ren:hover { border-color: #7a5caa; }

    .tile-ren-art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .tile-ren-label {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 0 6px 11px;
      width: 100%;
    }

    .tile-ren-label .tile-name {
      color: #e8daf5;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    @media (prefers-color-scheme: dark) {
      .tile-ren { background: #110c20; border-color: #2e1f50; }
    }

    /* Mav — parchment RPG, matches Adventuring Log */
    .tile-mav {
      background: #e9dcc0;
      border-color: #c2a878;
      padding: 0;
      justify-content: flex-end;
    }

    .tile-mav:hover { border-color: #8a6508; }

    .tile-mav-art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .tile-mav-label {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 0 6px 11px;
      width: 100%;
    }

    .tile-mav-label .tile-name {
      color: #3a2a18;
      font-family: 'Georgia', serif;
      text-shadow: 0 1px 2px rgba(255,255,255,0.4);
    }

    @media (prefers-color-scheme: dark) {
      .tile-mav { background: #1c1208; border-color: #5a4327; }
      .tile-mav-label .tile-name { color: #ecdcae; }
    }

    .tile-name {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-primary);
      text-align: center;
      line-height: 1.25;
    }

    .tile-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-live { background: #0F6E56; }
    .dot-soon { background: var(--border); }

    @media (prefers-color-scheme: dark) {
      .dot-live { background: #5DCAA5; }
      .tile-mav-art .parchment-bg { fill: #2b1d10; }
    }

    /* divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.4rem 0 1rem;
    }

    .divider span {
      font-size: 10.5px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      font-weight: 300;
    }

    .divider hr { flex: 1; border: none; border-top: 0.5px solid var(--border); }

    /* request row */
    .request-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.14s ease, transform 0.14s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .request-row:hover {
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    .request-row:active { transform: scale(0.98); }

    .req-icon {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .req-name {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .req-desc {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 300;
    }

    .req-arrow {
      margin-left: auto;
      font-size: 16px;
      color: var(--text-muted);
    }

    footer {
      margin-top: 2.5rem;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.03em;
      font-style: italic;
    }

    .icon {
      display: inline-block;
      width: 22px;
      height: 22px;
      vertical-align: middle;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-sm {
      display: inline-block;
      width: 18px;
      height: 18px;
      vertical-align: middle;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>

  <!-- PIN SCREEN -->
  <div id="pin-screen">
    <h1><span class="name-ren">Ren</span><span class="ampersand"> &amp; </span><span class="name-mav">Mav</span>'s Home</h1>
    <p>enter your pin</p>

    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <div class="pin-grid">
      <button class="pin-btn" onclick="press('1')">1</button>
      <button class="pin-btn" onclick="press('2')">2</button>
      <button class="pin-btn" onclick="press('3')">3</button>
      <button class="pin-btn" onclick="press('4')">4</button>
      <button class="pin-btn" onclick="press('5')">5</button>
      <button class="pin-btn" onclick="press('6')">6</button>
      <button class="pin-btn" onclick="press('7')">7</button>
      <button class="pin-btn" onclick="press('8')">8</button>
      <button class="pin-btn" onclick="press('9')">9</button>
      <button class="pin-btn zero" onclick="press('0')">0</button>
      <button class="pin-btn del" onclick="del()" aria-label="Delete">⌫</button>
    </div>

    <div id="pin-error">incorrect pin</div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <header>
      <h1><span class="name-ren">Ren</span><span class="ampersand"> &amp; </span><span class="name-mav">Mav</span>'s Home</h1>
      <p>your household tools</p>
    </header>

    <main class="section">

      <div class="app-grid">

        <!-- Ren's Journal — clean night sky tile -->
        <a class="app-tile tile-ren" href="https://ren.reilly.live" target="_blank" rel="noopener noreferrer">
          <svg class="tile-ren-art" viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid slice">
            <defs>
              <linearGradient id="renSky" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#130d28"/>
                <stop offset="100%" stop-color="#251545"/>
              </linearGradient>
              <radialGradient id="renMoonGlow" cx="72%" cy="28%" r="35%">
                <stop offset="0%" stop-color="#f5e8a0" stop-opacity="0.18"/>
                <stop offset="100%" stop-color="#f5e8a0" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect width="120" height="110" fill="url(#renSky)"/>
            <rect width="120" height="110" fill="url(#renMoonGlow)"/>
            <!-- 5 clean stars -->
            <circle cx="14" cy="11" r="1.3" fill="#e8daf5" opacity="0.85"/>
            <circle cx="38" cy="6"  r="1.0" fill="#e8daf5" opacity="0.7"/>
            <circle cx="58" cy="15" r="1.5" fill="#e8daf5" opacity="0.9"/>
            <circle cx="28" cy="26" r="0.9" fill="#e8daf5" opacity="0.6"/>
            <circle cx="48" cy="30" r="0.7" fill="#e8daf5" opacity="0.5"/>
            <!-- crescent moon — large, top right -->
            <circle cx="88" cy="24" r="18" fill="#f5e8a0" opacity="0.92"/>
            <circle cx="96" cy="18" r="14" fill="#130d28"/>
            <!-- cat silhouette — simple block shapes -->
            <g transform="translate(40,108)">
              <!-- body -->
              <ellipse cx="0" cy="-18" rx="18" ry="20" fill="#111218"/>
              <!-- head -->
              <ellipse cx="0" cy="-40" rx="15" ry="13" fill="#111218"/>
              <!-- ears -->
              <polygon points="-15,-48 -10,-64 -4,-48" fill="#111218"/>
              <polygon points="15,-48 10,-64 4,-48" fill="#111218"/>
              <!-- eyes — the only bright detail -->
              <ellipse cx="-5.5" cy="-41" rx="4.5" ry="4" fill="#7acc44"/>
              <ellipse cx="5.5"  cy="-41" rx="4.5" ry="4" fill="#7acc44"/>
              <ellipse cx="-5.5" cy="-41" rx="1.6" ry="3.5" fill="#0a0810"/>
              <ellipse cx="5.5"  cy="-41" rx="1.6" ry="3.5" fill="#0a0810"/>
            </g>
          </svg>
          <div class="tile-ren-label">
            <div class="tile-name">Ren's Journal</div>
            <div class="tile-dot dot-live"></div>
          </div>
        </a>

        <!-- Mav's Quest Log — clean parchment RPG tile -->
        <a class="app-tile tile-mav" href="https://mav.reilly.live" target="_blank" rel="noopener noreferrer">
          <svg class="tile-mav-art" viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" preserveAspectRatio="xMidYMid slice">
            <defs>
              <linearGradient id="mavParch" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#f0e4c6"/>
                <stop offset="100%" stop-color="#e0cfa0"/>
              </linearGradient>
            </defs>
            <rect class="parchment-bg" width="120" height="110" fill="url(#mavParch)"/>
            <!-- shield — filled, bold, readable -->
            <path d="M60,12 L84,24 L84,54 C84,70 60,82 60,82 C60,82 36,70 36,54 L36,24 Z"
              fill="#b8860b" opacity="0.18"/>
            <path d="M60,12 L84,24 L84,54 C84,70 60,82 60,82 C60,82 36,70 36,54 L36,24 Z"
              fill="none" stroke="#8a6508" stroke-width="2.5" opacity="0.6"/>
            <!-- sword — vertical through shield -->
            <line x1="60" y1="4"  x2="60" y2="88" stroke="#8a6508" stroke-width="3.5" stroke-linecap="round" opacity="0.65"/>
            <!-- crossguard -->
            <line x1="44" y1="30" x2="76" y2="30" stroke="#8a6508" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
            <!-- pommel circle -->
            <circle cx="60" cy="88" r="5" fill="#8a6508" opacity="0.55"/>
          </svg>
          <div class="tile-mav-label">
            <div class="tile-name">Quest Log</div>
            <div class="tile-dot dot-live"></div>
          </div>
        </a>

        <!-- Meal Hub -->
        <a class="app-tile" href="https://shopping.reilly.live" target="_blank" rel="noopener noreferrer">
          <div class="tile-icon accent-teal" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          </div>
          <div class="tile-name">Meal Hub</div>
          <div class="tile-dot dot-live"></div>
        </a>

        <!-- Ledger -->
        <a class="app-tile" href="https://budget.reilly.live" target="_blank" rel="noopener noreferrer">
          <div class="tile-icon accent-amber" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <div class="tile-name">Ledger</div>
          <div class="tile-dot dot-live"></div>
        </a>

        <!-- Pets -->
        <a class="app-tile" href="https://pets.reilly.live" target="_blank" rel="noopener noreferrer">
          <div class="tile-icon accent-coral" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24"><path d="M10 5.172C10 3.782 8.423 2.679 6.5 3c-2.823.47-4.113 6.006-4 7 .08.703 1.725 1.722 3.656 1 1.261-.472 1.96-1.45 2.344-2.5"/><path d="M14.267 5.172c0-1.39 1.577-2.493 3.5-2.172 2.823.47 4.113 6.006 4 7-.08.703-1.725 1.722-3.656 1-1.261-.472-1.855-1.45-2.239-2.5"/><path d="M8 14v.5M16 14v.5M11.25 16.25h1.5M12 17v1"/><ellipse cx="12" cy="13" rx="4" ry="5"/></svg>
          </div>
          <div class="tile-name">Pets</div>
          <div class="tile-dot dot-live"></div>
        </a>

        <!-- Media -->
        <a class="app-tile" href="https://media.reilly.live" target="_blank" rel="noopener noreferrer">
          <div class="tile-icon accent-purple" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          </div>
          <div class="tile-name">Media</div>
          <div class="tile-dot dot-live"></div>
        </a>

        <!-- Coming soon: Calendar -->
        <div class="app-tile coming-soon">
          <div class="tile-icon accent-blue" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <div class="tile-name">Calendar</div>
          <div class="tile-dot dot-soon"></div>
        </div>

        <!-- Coming soon: Workout -->
        <div class="app-tile coming-soon">
          <div class="tile-icon accent-green" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
          </div>
          <div class="tile-name">Workout</div>
          <div class="tile-dot dot-soon"></div>
        </div>

      </div>

      <!-- Request a tool -->
      <div class="divider"><hr><span>feedback</span><hr></div>

      <a class="request-row" href="https://form.typeform.com/to/Ee2dx8VJ" target="_blank" rel="noopener noreferrer">
        <div class="req-icon accent-pink" aria-hidden="true">
          <svg class="icon-sm" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </div>
        <div>
          <div class="req-name">Request a tool</div>
          <div class="req-desc">Got an idea? I'll build it</div>
        </div>
        <span class="req-arrow">›</span>
      </a>

    </main>

    <footer>made with ♥ by your husband</footer>
  </div>

  <script>
    const SESSION_KEY = 'renmav_auth';
    let entered = '';
    let checking = false;

    if (sessionStorage.getItem(SESSION_KEY) === 'true') unlock(false);

    function press(digit) {
      if (entered.length >= 4 || checking) return;
      entered += digit;
      updateDots();
      if (entered.length === 4) {
        checking = true;
        setTimeout(check, 120);
      }
    }

    function del() {
      if (checking) return;
      entered = entered.slice(0, -1);
      updateDots();
      clearError();
    }

    function updateDots() {
      for (let i = 0; i < 4; i++) {
        const dot = document.getElementById('d' + i);
        dot.classList.toggle('filled', i < entered.length);
        dot.classList.remove('error');
      }
    }

    async function check() {
      try {
        const res = await fetch('/api/verify-pin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pin: entered }),
        });
        const { ok } = await res.json();
        if (ok) {
          sessionStorage.setItem(SESSION_KEY, 'true');
          unlock(true);
        } else {
          showError();
        }
      } catch (e) {
        showError();
      } finally {
        if (!sessionStorage.getItem(SESSION_KEY)) {
          for (let i = 0; i < 4; i++) {
            const dot = document.getElementById('d' + i);
            dot.classList.add('error');
            dot.classList.remove('filled');
          }
          setTimeout(() => {
            entered = '';
            checking = false;
            updateDots();
          }, 600);
        }
      }
    }

    function unlock(animate) {
      const pin = document.getElementById('pin-screen');
      const dash = document.getElementById('dashboard');
      if (animate) {
        pin.style.transition = 'opacity 0.3s ease';
        pin.style.opacity = '0';
        setTimeout(() => {
          pin.style.display = 'none';
          dash.classList.add('visible');
        }, 300);
      } else {
        pin.style.display = 'none';
        dash.classList.add('visible');
      }
    }

    function showError() {
      document.getElementById('pin-error').classList.add('show');
    }

    function clearError() {
      document.getElementById('pin-error').classList.remove('show');
    }

    document.addEventListener('keydown', (e) => {
      if (document.getElementById('pin-screen').style.display === 'none') return;
      if (e.key >= '0' && e.key <= '9') press(e.key);
      if (e.key === 'Backspace') del();
    });
  </script>

</body>
