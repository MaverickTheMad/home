<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ren & Mav's Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f8f6;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-hover: rgba(0,0,0,0.22);
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-muted: #9a9890;
      --radius-md: 8px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --surface: #242422;
        --border: rgba(255,255,255,0.1);
        --border-hover: rgba(255,255,255,0.22);
        --text-primary: #f1efea;
        --text-secondary: #b4b2a9;
        --text-muted: #6b6a66;
      }
      .accent-teal  { background: #04342C !important; color: #5DCAA5 !important; }
      .accent-blue  { background: #042C53 !important; color: #85B7EB !important; }
      .accent-amber { background: #412402 !important; color: #EF9F27 !important; }
      .accent-coral { background: #4A1B0C !important; color: #F0997B !important; }
      .accent-purple{ background: #26215C !important; color: #AFA9EC !important; }
      .badge-live   { background: #04342C !important; color: #5DCAA5 !important; }
      .badge-soon   { background: #2c2c2a !important; color: #6b6a66 !important; }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.7rem, 5vw, 2.2rem);
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .header h1 em {
      font-style: italic;
      color: var(--text-secondary);
    }

    .header p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .section {
      width: 100%;
      max-width: 620px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .app-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.2rem 1.1rem 1rem;
      text-decoration: none;
      display: block;
      transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    a.app-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }

    .app-card.coming-soon {
      opacity: 0.5;
      pointer-events: none;
    }

    .accent {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      font-size: 19px;
    }

    .accent-teal   { background: #E1F5EE; color: #0F6E56; }
    .accent-blue   { background: #E6F1FB; color: #185FA5; }
    .accent-amber  { background: #FAEEDA; color: #854F0B; }
    .accent-coral  { background: #FAECE7; color: #993C1D; }
    .accent-purple { background: #EEEDFE; color: #534AB7; }

    .app-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 3px;
    }

    .app-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      font-weight: 300;
    }

    .badge {
      position: absolute;
      top: 11px;
      right: 11px;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 99px;
      letter-spacing: 0.03em;
    }

    .badge-live { background: #E1F5EE; color: #0F6E56; }
    .badge-soon { background: #f1efe8; color: #9a9890; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.5rem 0 1rem;
    }

    .divider span {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      white-space: nowrap;
      font-weight: 300;
    }

    .divider hr {
      flex: 1;
      border: none;
      border-top: 0.5px solid var(--border);
    }

    footer {
      margin-top: 2.5rem;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.03em;
      font-style: italic;
    }

    /* svg icon shim — render inline SVG icons */
    .icon { display: inline-block; width: 19px; height: 19px; vertical-align: middle; fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>

  <header class="header">
    <h1>Ren &amp; <em>Mav's</em> Home</h1>
    <p>your household tools</p>
  </header>

  <main class="section">

    <!-- Live apps -->
    <div class="grid">
      <a class="app-card" href="https://shopping.reilly.live" target="_blank" rel="noopener noreferrer">
        <span class="badge badge-live">live</span>
        <div class="accent accent-teal" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        </div>
        <div class="app-name">Shopping List</div>
        <div class="app-desc">Shared grocery &amp; errand lists</div>
      </a>
    </div>

    <!-- Coming soon -->
    <div class="divider">
      <hr><span>coming soon</span><hr>
    </div>

    <div class="grid">
      <div class="app-card coming-soon">
        <span class="badge badge-soon">soon</span>
        <div class="accent accent-amber" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M16 2v4M8 2v4M2 10h20"/><path d="M9 16l2 2 4-4"/></svg>
        </div>
        <div class="app-name">Budget</div>
        <div class="app-desc">Track spending together</div>
      </div>

      <div class="app-card coming-soon">
        <span class="badge badge-soon">soon</span>
        <div class="accent accent-blue" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M16 2v4M8 2v4M2 10h20M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
        </div>
        <div class="app-name">Calendar</div>
        <div class="app-desc">Shared family schedule</div>
      </div>

      <div class="app-card coming-soon">
        <span class="badge badge-soon">soon</span>
        <div class="accent accent-coral" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24"><path d="M10 5.172C10 3.782 8.423 2.679 6.5 3c-2.823.47-4.113 6.006-4 7 .08.703 1.725 1.722 3.656 1 1.261-.472 1.96-1.45 2.344-2.5"/><path d="M14.267 5.172c0-1.39 1.577-2.493 3.5-2.172 2.823.47 4.113 6.006 4 7-.08.703-1.725 1.722-3.656 1-1.261-.472-1.855-1.45-2.239-2.5"/><path d="M8 14v.5M16 14v.5M11.25 16.25h1.5M12 17v1"/><ellipse cx="12" cy="13" rx="4" ry="5"/></svg>
        </div>
        <div class="app-name">Pets</div>
        <div class="app-desc">Pet info &amp; care hub</div>
      </div>
    </div>

  </main>

  <footer>made with ♥ by your husband</footer>

</body>
</html>
